name: "ember-cli @ main"

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}
  schedule:
    - cron: 0 0 * * *

concurrency:
  group: ember-cli-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  cli: git@github.com:ember-cli/ember-cli.git
  source: git@github.com:emberjs/ember.js.git

jobs:
  ##################
  #
  # Tests ember-cli
  #
  # TODO: when anything falis here, auto-open an issue on ember-cli
  new_app:
    name: "🖥️ App"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        args:
          - ""
          - "--pnpm"
          - "--typescript"

    steps:
      - uses: actions/checkout@v4
      - uses: wyvox/action-setup-pnpm@v3
      - run: pnpm test:ember-cli ${{ matrix.args }}

  ##################
  #
  # Tests ember-cli
  #
  new_library:
    name: "📦 Library" # V2 Addon blueprint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        args:
          - "--npm"
          - "--pnpm"
          - "--typescript --npm"
          - "--typescript --pnpm"

    steps:
      - uses: actions/checkout@v4
      - uses: wyvox/action-setup-pnpm@v3
      - run: pnpm test:library ${{ matrix.args }}

  notify:
    name: "Discord Notification"
    needs: [new_app, new_library]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ (needs.new_app.result == 'success' && needs.new_library.result == 'success') && 'success' || 'failure' }}
          title: "ember-cli @ main"
          description: "Ecosystem CI results for ember-cli @ main"
